<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-Frame-Options" content="ALLOWALL">
<title>فضاء لمادة الاجتماعيات — المستوى السادس ابتدائي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap');

:root {
  /* Brand palette */
  --ink:#0D0D0D;--ink2:#1A1A2E;
  --surface:#FFFFFF;--surface2:#F8F9FF;--surface3:#EEF0FF;
  --border:#E2E4F0;--border2:#CBD0E8;

  /* Subject accents */
  --hist:#D4380D;--hist-bg:#FFF2EE;--hist-soft:#FFCFBD;--hist-glow:rgba(212,56,13,.15);
  --geo:#0070F3;--geo-bg:#EFF6FF;--geo-soft:#BDD7FF;--geo-glow:rgba(0,112,243,.15);
  --civ:#7C3AED;--civ-bg:#F5F0FF;--civ-soft:#D4BBFF;--civ-glow:rgba(124,58,237,.15);

  /* Primary green */
  --p:#16A34A;--p2:#15803D;--p-bg:#F0FDF4;--p-soft:#BBF7D0;

  /* Gold / XP */
  --xp:#F59E0B;--xp2:#D97706;--xp-bg:#FFFBEB;

  /* UI */
  --success:#16A34A;--error:#DC2626;--warn:#F59E0B;
  --tx:#111827;--tx2:#374151;--tx3:#6B7280;--tx4:#9CA3AF;

  --r:16px;--r2:12px;--r3:8px;
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 16px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --s3:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
  --s4:0 24px 64px rgba(0,0,0,.16),0 8px 24px rgba(0,0,0,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--surface2);color:var(--tx);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ══ TOP STRIPE ══ */
.topbar{height:4px;background:linear-gradient(90deg,var(--hist) 0%,var(--xp) 33%,var(--p) 66%,var(--geo) 100%)}

/* ══ HEADER ══ */
header{background:var(--ink2);color:#fff;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 90% 50%,rgba(22,163,74,.18),transparent),
    radial-gradient(ellipse 40% 60% at 10% 20%,rgba(0,112,243,.12),transparent),
    radial-gradient(ellipse 30% 40% at 50% 90%,rgba(124,58,237,.1),transparent);
  pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}

.hdr{max-width:1140px;margin:auto;padding:20px 24px 24px;position:relative;z-index:1;display:flex;align-items:center;gap:20px}
.logo-wrap{position:relative;flex-shrink:0}
.logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#16A34A,#0D9488);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;text-align:center;line-height:1.2;letter-spacing:-.2px;box-shadow:0 0 0 2px rgba(255,255,255,.15),0 8px 24px rgba(22,163,74,.4)}
.logo-badge{position:absolute;top:-5px;left:-5px;background:var(--xp);color:#fff;font-size:8px;font-weight:900;padding:2px 5px;border-radius:6px;border:2px solid var(--ink2);white-space:nowrap}
.ht{flex:1}
.ht h1{font-size:20px;font-weight:900;line-height:1.2;letter-spacing:-.3px}
.ht h1 span{background:linear-gradient(90deg,#4ADE80,#34D399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ht p{font-size:12px;color:rgba(255,255,255,.55);margin-top:5px;font-weight:500}
.hstats{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.hstat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;color:rgba(255,255,255,.8);backdrop-filter:blur(8px);transition:.2s}
.hstat:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18)}
.hstat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.hstat-dot.h{background:var(--hist)}.hstat-dot.g{background:var(--geo)}.hstat-dot.c{background:var(--civ)}.hstat-dot.x{background:var(--xp)}

/* ══ MAIN ══ */
main{max-width:1140px;margin:auto;padding:28px 24px 60px}

/* ══ SECTION LABEL ══ */
.sec-lbl{display:flex;align-items:center;gap:10px;margin:0 0 16px;font-size:12px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ══ UNITS GRID ══ */
.ug{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px;margin-bottom:18px}

/* ══ UNIT CARD ══ */
.uc{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--s1);transition:all .22s cubic-bezier(.34,1.56,.64,1);cursor:default}
.uc:hover{box-shadow:var(--s3);transform:translateY(-4px);border-color:var(--border2)}

/* Unit card header */
.uch{padding:14px 16px 12px;position:relative;overflow:hidden}
.uch-bg{position:absolute;inset:0;opacity:.07}
.uch.gr .uch-bg{background:linear-gradient(135deg,var(--p),var(--p2))}
.uch.bl .uch-bg{background:linear-gradient(135deg,var(--geo),#2563EB)}
.uch.pu .uch-bg{background:linear-gradient(135deg,var(--civ),#6D28D9)}
.uch.or .uch-bg{background:linear-gradient(135deg,#EA580C,var(--hist))}
.uch.cy .uch-bg{background:linear-gradient(135deg,#0891B2,#0E7490)}
.uch.ro .uch-bg{background:linear-gradient(135deg,#E11D48,#BE123C)}

.uch-inner{position:relative;display:flex;align-items:center;gap:10px}
.ucn{width:38px;height:38px;border-radius:10px;font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.uch.gr .ucn{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 4px 12px rgba(22,163,74,.35)}
.uch.bl .ucn{background:linear-gradient(135deg,var(--geo),#2563EB);color:#fff;box-shadow:0 4px 12px rgba(0,112,243,.35)}
.uch.pu .ucn{background:linear-gradient(135deg,var(--civ),#6D28D9);color:#fff;box-shadow:0 4px 12px rgba(124,58,237,.35)}
.uch.or .ucn{background:linear-gradient(135deg,#EA580C,var(--hist));color:#fff;box-shadow:0 4px 12px rgba(212,56,13,.35)}
.uch.cy .ucn{background:linear-gradient(135deg,#0891B2,#0E7490);color:#fff;box-shadow:0 4px 12px rgba(8,145,178,.35)}
.uch.ro .ucn{background:linear-gradient(135deg,#E11D48,#BE123C);color:#fff;box-shadow:0 4px 12px rgba(225,29,72,.35)}

.uch-txt h3{font-size:13px;font-weight:800;color:var(--tx);line-height:1.3}
.uch-txt p{font-size:10.5px;color:var(--tx3);margin-top:1px;font-weight:500}
.uch-count{margin-right:auto;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--tx3);white-space:nowrap;margin-right:0;margin-left:auto}

/* Unit body — lesson list */
.ucl{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px}

/* ══ LESSON BUTTON ══ */
.lb{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;transition:all .16s cubic-bezier(.34,1.56,.64,1);font-size:12.5px;font-weight:600;color:var(--tx2);background:var(--surface);position:relative;user-select:none}
.lb:hover{transform:translateX(-3px) scale(1.008);border-color:var(--border2);background:var(--surface2);box-shadow:var(--s2)}

/* active states */
.lb.ha{background:var(--hist-bg);border-color:var(--hist-soft);color:var(--hist)}
.lb.ga{background:var(--geo-bg);border-color:var(--geo-soft);color:var(--geo)}
.lb.ca{background:var(--civ-bg);border-color:var(--civ-soft);color:var(--civ)}

/* lesson icon pill */
.li{width:28px;height:28px;border-radius:8px;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:800;transition:.15s}
.li.h{background:var(--hist-bg);color:var(--hist)}.li.g{background:var(--geo-bg);color:var(--geo)}.li.c{background:var(--civ-bg);color:var(--civ)}
.lb:hover .li{transform:scale(1.1)}

.ln{flex:1;line-height:1.35}

/* subject badge */
.llb{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:800;border:1px solid;white-space:nowrap}
.llb.h{background:var(--hist-bg);color:var(--hist);border-color:var(--hist-soft)}
.llb.g{background:var(--geo-bg);color:var(--geo);border-color:var(--geo-soft)}
.llb.c{background:var(--civ-bg);color:var(--civ);border-color:var(--civ-soft)}

/* arrow indicator */
.lb::after{content:'‹';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tx4);opacity:0;transition:.15s}
.lb:hover::after{opacity:1;left:6px}

/* ══ QUIZ PANEL ══ */
#quiz{display:none;margin-bottom:28px}
@keyframes quizIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.quiz-wrap{border-radius:20px;overflow:hidden;box-shadow:var(--s4);animation:quizIn .35s cubic-bezier(.34,1.56,.64,1)}

/* Quiz header */
.qhdr{padding:20px 24px 18px;position:relative;overflow:hidden;color:#fff}
.qhdr::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");pointer-events:none}
.qhdr.h{background:linear-gradient(135deg,#7F1D1D,var(--hist),#C2410C)}
.qhdr.g{background:linear-gradient(135deg,#1E3A8A,var(--geo),#2563EB)}
.qhdr.c{background:linear-gradient(135deg,#3B0764,var(--civ),#7C3AED)}

.qhr{display:flex;align-items:flex-start;gap:14px;position:relative}
.qhico{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;backdrop-filter:blur(4px)}
.qhinfo{flex:1}
.qhbdg{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;margin-bottom:6px;backdrop-filter:blur(4px);letter-spacing:.3px}
.qhtit{font-size:15px;font-weight:900;line-height:1.35;letter-spacing:-.2px}
.qcls{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:7px 14px;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:11px;font-weight:800;flex-shrink:0;transition:.2s;backdrop-filter:blur(4px);display:flex;align-items:center;gap:5px}
.qcls:hover{background:rgba(255,255,255,.28);transform:scale(1.04)}

/* Progress strip */
.qpstrip{margin-top:14px;position:relative}
.qpb{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.qpf{height:100%;background:linear-gradient(90deg,rgba(255,255,255,.6),rgba(255,255,255,.9));border-radius:99px;transition:.5s cubic-bezier(.34,1.56,.64,1)}
.qpt{font-size:10px;color:rgba(255,255,255,.65);margin-top:5px;font-weight:700;display:flex;justify-content:space-between}

/* Quiz body */
.qbody{background:var(--surface);padding:20px 22px;border:1.5px solid var(--border);border-top:none;border-radius:0 0 20px 20px}

/* ══ LEVEL SEPARATORS ══ */
.lvsep{display:flex;align-items:center;gap:10px;margin:20px 0 12px;font-size:10.5px;font-weight:800;letter-spacing:.6px;text-transform:uppercase}
.lvsep::before,.lvsep::after{content:'';flex:1;height:1px;background:var(--border)}
.lvsep.b1{color:var(--success)}.lvsep.b2{color:var(--xp2)}.lvsep.b3{color:var(--geo)}
.lvsep.k1{color:var(--p)}.lvsep.k2{color:var(--hist)}.lvsep.k3{color:var(--civ)}

/* ══ QUESTION CARD ══ */
.qc{border:1.5px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;transition:all .25s cubic-bezier(.34,1.56,.64,1);background:var(--surface)}
.qc:hover{box-shadow:var(--s2)}
.qc.ok{border-color:rgba(22,163,74,.4);background:linear-gradient(135deg,#F0FDF4 0%,var(--surface) 100%)}
.qc.ko{border-color:rgba(220,38,38,.4);background:linear-gradient(135deg,#FEF2F2 0%,var(--surface) 100%)}

.qch{padding:12px 15px;background:var(--surface2);display:flex;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border)}
.qc.ok .qch{background:linear-gradient(135deg,#DCFCE7,#F0FDF4)}
.qc.ko .qch{background:linear-gradient(135deg,#FEE2E2,#FEF2F2)}

.qnum{width:28px;height:28px;border-radius:8px;font-weight:900;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.qnum.h{background:linear-gradient(135deg,var(--hist),#C2410C)}.qnum.g{background:linear-gradient(135deg,var(--geo),#2563EB)}.qnum.c{background:linear-gradient(135deg,var(--civ),#7C3AED)}

.qtx{font-size:13.5px;font-weight:600;flex:1;line-height:1.7;color:var(--tx)}
.qtags{display:flex;flex-direction:column;gap:3px;align-items:flex-end;flex-shrink:0;margin-top:1px}
.ltag{font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:6px;border:1px solid;white-space:nowrap;letter-spacing:.2px}
.ltag.b1{background:#DCFCE7;color:#15803D;border-color:#BBF7D0}
.ltag.b2{background:#FEF9C3;color:#A16207;border-color:#FDE68A}
.ltag.b3{background:#DBEAFE;color:#1D4ED8;border-color:#BFDBFE}
.ltag.k1{background:#D1FAE5;color:#065F46;border-color:#A7F3D0}
.ltag.k2{background:#FFEDD5;color:#9A3412;border-color:#FED7AA}
.ltag.k3{background:#EDE9FE;color:#5B21B6;border-color:#DDD6FE}
.ttype{font-size:8px;font-weight:700;padding:2px 6px;border-radius:6px;background:var(--surface3);color:var(--tx3);border:1px solid var(--border)}

/* ══ SUPPORT BLOCKS ══ */
.sup{margin:10px 14px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.suph{padding:7px 12px;font-size:10px;font-weight:800;display:flex;align-items:center;gap:6px;letter-spacing:.2px}
.supb{padding:10px 13px;font-size:12px;line-height:1.85;color:var(--tx2)}
.sup.doc .suph{background:#DBEAFE;color:#1E40AF}.sup.doc .supb{background:#EFF6FF}
.sup.stat .suph{background:#FEF9C3;color:#92400E}.sup.stat .supb{background:#FFFDE7}
.sup.law .suph{background:#EDE9FE;color:#4C1D95}.sup.law .supb{background:#F5F3FF}
.sup.img .suph{background:#FFEDD5;color:#9A3412}.sup.img .supb{background:#FFF7ED}
.sup.task .suph{background:#D1FAE5;color:#065F46}.sup.task .supb{background:#ECFDF5}
.sup table{width:100%;border-collapse:collapse;font-size:11.5px}
.sup th{background:rgba(0,0,0,.04);padding:5px 8px;border:1px solid var(--border);font-weight:800;text-align:center}
.sup td{padding:5px 8px;border:1px solid var(--border);text-align:center}
.sup td:first-child{text-align:right;font-weight:600}

/* ══ MCQ OPTIONS ══ */
.opts{padding:10px 14px 8px;display:flex;flex-direction:column;gap:7px}
.opt{display:flex;align-items:center;gap:10px;padding:10px 13px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:13px;background:var(--surface);transition:all .16s cubic-bezier(.34,1.56,.64,1);color:var(--tx);font-weight:500}
.opt:hover:not(.dis){background:var(--surface3);border-color:var(--border2);transform:translateX(-3px);box-shadow:var(--s1)}
.opt.ok{background:linear-gradient(135deg,#DCFCE7,#F0FDF4);border-color:rgba(22,163,74,.5);color:#14532D;font-weight:700;transform:none}
.opt.ko{background:linear-gradient(135deg,#FEE2E2,#FEF2F2);border-color:rgba(220,38,38,.5);color:#7F1D1D;font-weight:700;transform:none}
.opt.rv{background:linear-gradient(135deg,#DCFCE7,#F0FDF4);border-color:rgba(22,163,74,.4);color:#14532D}
.opt.dis{cursor:not-allowed;opacity:.85}

.olet{width:26px;height:26px;border-radius:7px;background:var(--surface2);font-weight:900;font-size:10.5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--tx3);border:1px solid var(--border);transition:.15s}
.opt.ok .olet,.opt.rv .olet{background:var(--success);color:#fff;border-color:var(--success);box-shadow:0 2px 8px rgba(22,163,74,.3)}
.opt.ko .olet{background:var(--error);color:#fff;border-color:var(--error);box-shadow:0 2px 8px rgba(220,38,38,.3)}
.opt:hover:not(.dis) .olet{background:var(--border2);color:var(--tx)}

/* ══ TRUE/FALSE ══ */
.tfr{padding:10px 14px;display:flex;gap:10px}
.tfb{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;background:var(--surface);text-align:center;transition:all .18s cubic-bezier(.34,1.56,.64,1);color:var(--tx);display:flex;align-items:center;justify-content:center;gap:7px}
.tfb:hover:not(.dis){transform:translateY(-3px) scale(1.02);box-shadow:var(--s2)}
.tfb-t:hover:not(.dis){background:var(--p-bg);border-color:var(--p-soft);color:var(--p)}
.tfb-f:hover:not(.dis){background:#FEF2F2;border-color:#FECACA;color:var(--error)}
.tfb.sah{background:linear-gradient(135deg,#DCFCE7,#F0FDF4);border-color:rgba(22,163,74,.5);color:#14532D;transform:none}
.tfb.kha{background:linear-gradient(135deg,#FEE2E2,#FEF2F2);border-color:rgba(220,38,38,.5);color:#7F1D1D;transform:none}
.tfb.dis{cursor:not-allowed;opacity:.85}

/* ══ FEEDBACK ══ */
.fbk{margin:4px 14px 10px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
.fbk.ok{background:linear-gradient(135deg,#DCFCE7,#F0FDF4);color:#14532D;border:1px solid rgba(22,163,74,.25)}
.fbk.ko{background:linear-gradient(135deg,#FEE2E2,#FEF2F2);color:#7F1D1D;border:1px solid rgba(220,38,38,.25)}
.fbk-ico{font-size:16px;flex-shrink:0;margin-top:1px}

/* ══ MODEL ANSWER ══ */
.model{margin:4px 14px 12px;border-radius:12px;overflow:hidden;border:1.5px solid rgba(245,158,11,.4);box-shadow:0 2px 12px rgba(245,158,11,.08)}
.model-h{background:linear-gradient(135deg,#FFFBEB,#FEF3C7);padding:9px 14px;font-size:12px;font-weight:800;color:#92400E;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;justify-content:space-between;transition:.15s;border-bottom:1px solid rgba(245,158,11,.2)}
.model-h:hover{background:linear-gradient(135deg,#FEF3C7,#FDE68A);filter:brightness(1.03)}
.model-h-left{display:flex;align-items:center;gap:7px}
.model-arr{font-size:14px;transition:.2s}
.model-b{background:#FFFBEB;padding:12px 15px;font-size:11.5px;line-height:1.95;color:#78350F;white-space:pre-wrap;font-family:'Cairo',monospace;display:none}
.model-b.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ══ SCORE SECTION ══ */
.sw{padding:28px 24px;text-align:center;border-top:1.5px solid var(--border);margin-top:12px;background:linear-gradient(135deg,var(--surface2),var(--surface))}

  g.innerHTML='';
  UNITS.forEach((u,ui)=>{
    const col=UCOL[ui%UCOL.length];
    const d=document.createElement('div');
    d.className='uc';
    const lc=u.ls.length;
    const ls=u.ls.map(l=>{
      const ic=l.tp==='h'?'📜':l.tp==='g'?'🗺️':'⚖️';
      const ac=CL===l.id?(l.tp==='h'?' ha':l.tp==='g'?' ga':' ca'):'';
      const lbl=l.tp==='h'?'تاريخ':l.tp==='g'?'جغرافيا':'مدنية';
      return`<div class="lb${ac}" onclick="openLesson('${u.id}','${l.id}')">
        <div class="li ${l.tp}">${ic}</div>
        <div class="ln">${l.nm}</div>
        <span class="llb ${l.tp}">${lbl}</span>
      </div>`;
    }).join('');
    d.innerHTML=`<div class="uch ${col}"><div class="uch-bg"></div><div class="uch-inner"><div class="ucn">${u.ic||ui+1}</div><div class="uch-txt"><h3>${u.nm}</h3><p>${['','درس','درسان','ثلاثة دروس','أربعة دروس','خمسة دروس','ستة دروس','سبعة دروس','ثمانية دروس','تسعة دروس','عشرة دروس'][lc]||lc+' دروس'} تفاعلية</p></div><div class="uch-count">${lc} 📚</div></div></div><div class="ucl">${ls}</div>`;

  qz.style.display='block';
  renderQuiz(l,ld);
  qz.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ═══ BUILD QUIZ HEADER ═══ */
function buildHeader(l,qs){
  const done=qs.filter((_,qi)=>ANS[qi]!==undefined).length;
  const ok=qs.filter((_,qi)=>ANS[qi]!==undefined&&isOk(qs[qi],qi)).length;
  const pct=qs.length?Math.round(done/qs.length*100):0;
  const SLBL={h:'📜 التاريخ',g:'🗺️ الجغرافيا',c:'⚖️ التربية المدنية'};
  return`<div class="qhdr ${l.tp}">
    <div class="qhr">
      <div style="flex:1">
        <div class="qhbdg">${SLBL[l.tp]}</div>
        <div class="qhtit">${l.nm}</div>
        <div class="qpb"><div class="qpf" style="width:${pct}%"></div></div>
        <div class="qpt">${done}/${qs.length} سؤالاً أُجيب عنه • ${ok} صحيح</div>
      </div>
      <button class="qcls" onclick="closeQuiz()">✕ إغلاق</button>
    </div>
  </div>`;
}

/* ═══ RENDER QUIZ ═══ */
function renderQuiz(l,ld){
  const qs=ld.qs;
  let html=buildHeader(l,qs);
  html+=`<div class="qbody">`;
  let lastLv=null;
  qs.forEach((q,qi)=>{
    if(q.lv!==lastLv){
      lastLv=q.lv;
      html+=`<div class="lvsep ${TCSS[q.lv]}">${TSEP[q.lv]||q.lv}</div>`;
    }
    html+=renderQCard(q,qi,l.tp);
  });
  if(qs.every((_,qi)=>ANS[qi]!==undefined)) html+=renderScore(qs);
  html+=`</div>`;
  document.getElementById('quiz').innerHTML=html;
  attachHandlers(l,ld);
}

/* ═══ RENDER Q CARD ═══ */
function renderQCard(q,qi,tp){
  const done=ANS[qi]!==undefined;
  const ok=done&&isOk(q,qi);
  const cc=done?(ok?'ok':'ko'):'';
  const supH=q.sup?q.sup:'';
  const body=q.t==='tf'?renderTF(q,qi,done):renderMCQ(q,qi,done);
  const fbH=done?`<div class="fbk ${ok?'ok':'ko'}"><span class="fbk-ico">${ok?'✅':'❌'}</span><span>${ok?'إجابة صحيحة!':`${q.t==='tf'&&q.corr?q.corr:'الإجابة الصحيحة: '+(q.o?.[q.a]||'')}`}</span></div>`:'';
  let modelH='';
  if(q.model){
    const show=done&&!ok;
    modelH=`<div class="model">
      <div class="model-h" onclick="toggleModel(${qi})"><div class="model-h-left">⭐ نموذج الجواب المتوقع</div><span class="model-arr">${show?'▲':'▼'}</span></div>
      <div class="model-b${show?' open':''}" id="mb${qi}">${q.model}</div>
    </div>`;
  }
  return`<div class="qc ${cc}" id="qc${qi}">
    <div class="qch">
      <div class="qnum ${tp}">${qi+1}</div>
      <div class="qtx">${q.q}</div>
      <div class="qtags">
        <span class="ltag ${q.lv}">${TLBL[q.lv]||q.lv}</span>
        <span class="ttype">${q.t==='tf'?'✓✗ صح/خطأ':'◉ اختيار'}</span>
      </div>
    </div>
    ${supH}${body}${fbH}${modelH}
  </div>`;
}

function renderMCQ(q,qi,done){
  return`<div class="opts">${(q.o||[]).map((o,oi)=>{
    let c='opt';
    if(done){
      c+=' dis';
      if(oi===q.a) c+=' rv';
      if(oi===ANS[qi]&&ANS[qi]!==q.a) c+=' ko';
      if(oi===ANS[qi]&&ANS[qi]===q.a) c+=' ok';
    }
    return`<div class="${c}" data-qi="${qi}" data-oi="${oi}">
      <span class="olet">${LET[oi]||oi}</span><span>${o}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderTF(q,qi,done){
  const ua=ANS[qi];
  let sc='tfb',kc='tfb';
  if(done){
    sc+=' dis'; kc+=' dis';
    if(q.correct===true) sc+=' sah'; else kc+=' kha';
    if(ua===true&&q.correct===false) sc+=' kha';
    if(ua===false&&q.correct===true) kc+=' kha';
  }
  return`<div class="tfr">
    <button class="${sc} tfb-t" data-qi="${qi}" data-v="true">✅ صحيح</button>
    <button class="${kc} tfb-f" data-qi="${qi}" data-v="false">❌ خطأ</button>
  </div>`;
}

/* ═══ HANDLERS ═══ */
function attachHandlers(l,ld){
  document.querySelectorAll('.opt:not(.dis)').forEach(el=>{
    el.addEventListener('click',()=>{
      const qi=+el.dataset.qi, oi=+el.dataset.oi;
      if(ANS[qi]!==undefined) return;
      ANS[qi]=oi;
      animate(qi, oi===ld.qs[qi].a);
      setTimeout(()=>renderQuiz(l,ld),300);
    });
  });
  document.querySelectorAll('.tfb:not(.dis)').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const qi=+btn.dataset.qi, v=btn.dataset.v==='true';
      if(ANS[qi]!==undefined) return;
      ANS[qi]=v;
      animate(qi, v===ld.qs[qi].correct);
      setTimeout(()=>renderQuiz(l,ld),300);
    });
  });
}

function toggleModel(qi){
  const mb=document.getElementById('mb'+qi);
  if(mb) mb.classList.toggle('open');
}

function animate(qi,ok){
  const c=document.getElementById('qc'+qi);
  if(c){ c.classList.add(ok?'pp':'sk'); setTimeout(()=>c.classList.remove('pp','sk'),400); }
}

/* ═══ SCORING ═══ */
function isOk(q,qi){
  if(q.t==='tf') return ANS[qi]===q.correct;
  return ANS[qi]===q.a;
}
function renderScore(qs){
  const ok=qs.filter((_,qi)=>ANS[qi]!==undefined&&isOk(qs[qi],qi)).length;
  const tot=qs.length;
  const pct=Math.round(ok/tot*100);
  const em=pct>=80?'🏆':pct>=60?'⭐':'📖';
  const msg=pct>=80?'ممتاز!':pct>=60?'جيد!':'راجع الدرس';
  const sub=pct>=80?'أداء متميِّز، واصل!':pct>=60?'راجع الأسئلة الخاطئة.':'أعِد المراجعة ثم حاول.';
  const col=pct>=80?'#16A34A':pct>=60?'#F59E0B':'#DC2626';
  const r=46,circ=2*Math.PI*r,dash=circ*(pct/100),gap=circ-dash;
  const byLv=[...new Set(qs.map(q=>q.lv))].map(lv=>{
    const lqs=qs.filter(q=>q.lv===lv);
    const lc=lqs.filter((q,i)=>{const qi=qs.indexOf(q);return ANS[qi]!==undefined&&isOk(q,qi)}).length;
    return`<div class="bylv-item"><div class="bylv-n">${lc}/${lqs.length}</div><div class="bylv-l">${TLBL[lv]||lv}</div></div>`;
  }).join('');
  return`<div class="sw">
    <div class="sc-ring">
      <svg viewBox="0 0 110 110"><circle class="sc-bg" cx="55" cy="55" r="${r}"/><circle class="sc-fg" cx="55" cy="55" r="${r}" stroke="${col}" stroke-dasharray="${dash} ${gap}"/></svg>
      <div class="sc-inner"><div class="sc-pct" style="color:${col}">${pct}%</div><div class="sc-sub">${ok}/${tot}</div></div>
    </div>
    <div class="smsg">${em} ${msg}</div>
    <div class="ssub">${sub}</div>
    <div class="bylv-wrap">${byLv}</div>
    <div class="sbts">
      <button class="btn bgr" onclick="retryLesson()">🔄 إعادة المحاولة</button>
      <button class="btn bgo" onclick="closeQuiz()">📚 درس آخر</button>
    </div>
  </div>`;
}

function retryLesson(){
  ANS={};
  const u=UNITS.find(x=>x.id===CU);
  const l=u.ls.find(x=>x.id===CL);
  const ld=getLessonData(CL);
  if(l&&ld) renderQuiz(l,ld);
}

function closeQuiz(){
  CU=null; CL=null; ANS={};
  document.getElementById('quiz').style.display='none';
  document.getElementById('quiz').innerHTML='';
  renderUnits();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══ INIT ═══ */
renderUnits();
</script>
</body>
</html>
